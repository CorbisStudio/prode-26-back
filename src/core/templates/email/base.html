<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Prode Mundial{% endblock %}</title>
</head>
<body style="margin:0; padding:0; background-color:#e8ecf4; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#e8ecf4; padding:32px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px; background-color:#ffffff; border-radius:24px; overflow:hidden; box-shadow:0 12px 40px rgba(26,39,68,0.12);">

          <!-- Logo Corbis -->
          <tr>
            <td style="padding:40px 44px 8px;">
              <img src="{{ logo_url }}" width="150" height="44" alt="Corbis — Prode Mundial" style="display:block; border:0; outline:none; text-decoration:none;">
            </td>
          </tr>

          <!-- Contenido -->
          <tr>
            <td style="padding:20px 44px 0; color:#1A2744;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Tagline (estilo login) -->
          <tr>
            <td style="padding:30px 44px 0;">
              <div style="border-top:1px solid #E5E7EB; padding-top:22px;">
                <div style="font-size:21px; font-weight:800; color:#1A2744; letter-spacing:-0.3px; line-height:1.25;">
                  Predecí. Competí. <span style="color:#C9A227;">Dominá.</span>
                </div>
                <p style="margin:6px 0 0; font-size:14px; color:#6B7280;">
                  El Prode que une al equipo. ¿Quién sabe más de fútbol?
                </p>
              </div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:28px 44px 36px;">
              <p style="margin:0; font-size:12px; line-height:18px; color:#9aa1ad;">
                Recibiste este correo porque alguien usó tu dirección para registrarse en
                Prode Mundial. Si no fuiste vos, podés ignorarlo.
              </p>
              <p style="margin:10px 0 0; font-size:12px; color:#9aa1ad;">
                Un proyecto de <strong style="color:#1E5FA5;">Corbis</strong> · Project Delivery Specialists.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
