apiVersion: apps/v1
kind: Deployment
metadata:
  name: prode-back-beat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: prode-back-beat
  template:
    metadata:
      labels:
        app: prode-back-beat
    spec:
      containers:
        - name: beat
          image: 714022400124.dkr.ecr.us-west-2.amazonaws.com/prode-back:latest
          command: ["celery", "-A", "prode", "beat", "-l", "info", "--schedule", "/tmp/celerybeat-schedule"]
          envFrom:
            - configMapRef:
                name: prode-back-config
            - secretRef:
                name: prode-back-secret
          resources:
            requests:
              memory: "96Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
