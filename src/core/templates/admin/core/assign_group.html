{% extends "admin/base_site.html" %}

{% block content %}
<form method="post">{% csrf_token %}
  {% for id in selected %}
    <input type="hidden" name="_selected_action" value="{{ id }}">
  {% endfor %}
  <input type="hidden" name="action" value="manage_group">
  <input type="hidden" name="apply" value="1">

  <p>Se aplicará sobre <strong>{{ users|length }}</strong> usuario(s) seleccionado(s).</p>

  <fieldset class="module aligned">
    {{ form.as_p }}
  </fieldset>

  <div class="submit-row">
    <input type="submit" value="Aplicar" class="default">
    <a href="{% url 'admin:auth_user_changelist' %}" class="button cancel-link">Cancelar</a>
  </div>
</form>
{% endblock %}
