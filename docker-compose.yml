name: prode-back

services:
    db:
        image: postgres:16-alpine
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=prode_1234
            - POSTGRES_DB=prode
        ports:
            - "5436:5432"
        volumes:
            - prode_data:/var/lib/postgresql/data

    web:
        build: .
        volumes:
            - ./src:/app
        ports:
            - "8000:8000"
        env_file:
            - ./.env
        stdin_open: true
        tty: true
        depends_on:
            - db

volumes:
    prode_data:
