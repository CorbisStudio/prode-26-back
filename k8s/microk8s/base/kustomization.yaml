apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prode-prod   # OBLIGATORIO — sin esto kubectl apply -k va al namespace default

resources:
  - pvc.yaml
  - configmap.yaml
  - db-deployment.yaml
  - db-service.yaml
  - redis-deployment.yaml
  - redis-service.yaml
  - deployment.yaml
  - worker-deployment.yaml
  - beat-deployment.yaml
  - service.yaml
  - ingress.yaml
  # secret.yaml NO se incluye — se crea manualmente con: kubectl create secret generic prode-back-secret
