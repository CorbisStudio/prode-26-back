apiVersion: v1
kind: ConfigMap
metadata:
  name: prode-back-config
data:
  DEBUG: "False"
  ALLOWED_HOSTS: "prode.vera-demo.site,localhost"
  STATIC_URL: "/static/"
  CSRF_TRUSTED_ORIGINS: "https://prode.vera-demo.site"
  # Base de datos (la app lee DB_*, el contenedor postgres lee POSTGRES_*)
  DB_NAME: "prode"
  DB_USERNAME: "postgres"
  DB_HOST: "prode-back-db"
  DB_PORT: "5432"
  POSTGRES_DB: "prode"
  POSTGRES_USER: "postgres"
  # Celery / Redis
  CELERY_BROKER_URL: "redis://prode-back-redis:6379/0"
  CELERY_RESULT_BACKEND: "redis://prode-back-redis:6379/0"
  # football-data.org
  FOOTBALL_DATA_BASE_URL: "https://api.football-data.org/v4/"
  WORLD_CUP_COMPETITION_CODE: "WC"
  # Email (SMTP) — la password va en el secret prode-back-secret (EMAIL_HOST_PASSWORD)
  EMAIL_BACKEND: "django.core.mail.backends.smtp.EmailBackend"
  EMAIL_HOST: "smtp.gmail.com"
  EMAIL_PORT: "587"
  EMAIL_USE_TLS: "True"
  EMAIL_HOST_USER: "prode.corbis@gmail.com"
  DEFAULT_FROM_EMAIL: "Prode Mundial <prode.corbis@gmail.com>"
  # Activación de cuenta por código
  ACTIVATION_CODE_TTL_MINUTES: "15"
  ACTIVATION_MAX_ATTEMPTS: "5"
